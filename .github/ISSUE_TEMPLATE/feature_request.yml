name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Policy management
        - Change request workflow
        - Version history / rollback
        - Multi-tenant support
        - Notifications
        - Audit / compliance
        - Authentication / RBAC
        - Developer experience / CI-CD
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
