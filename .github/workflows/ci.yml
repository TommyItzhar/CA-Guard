name: CI

on:
  push:
    branches: [main, develop, "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }}

jobs:
  # ─── Code quality ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "**/package.json"

      - name: Install dependencies
        run: npm install

      - name: TypeScript check — backend
        run: npx tsc --noEmit
        working-directory: backend

      - name: TypeScript check — frontend
        run: npx tsc --noEmit
        working-directory: frontend

      - name: ESLint — backend
        run: npx eslint src --max-warnings 0
        working-directory: backend
        continue-on-error: true

      - name: ESLint — frontend
        run: npx eslint src --max-warnings 0
        working-directory: frontend
        continue-on-error: true

  # ─── Unit & integration tests ─────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ca_guardian_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ca_guardian_test
      DB_USER: test_user
      DB_PASSWORD: test_password
      JWT_SECRET: test-secret-min-64-chars-long-for-testing-purposes-only-not-prod
      NODE_ENV: test
      AZURE_CLIENT_ID: test-client-id
      AZURE_CLIENT_SECRET: test-secret
      AZURE_TENANT_ID: test-tenant-id

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "**/package.json"

      - name: Install dependencies
        run: npm install

      - name: Run DB migrations
        run: psql postgresql://test_user:test_password@localhost:5432/ca_guardian_test -f ../database/schema.sql
        working-directory: backend

      - name: Run tests
        run: npm test --if-present -- --coverage --ci
        working-directory: backend

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          flags: backend
          directory: backend/coverage

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "**/package.json"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present -- --run --coverage
        working-directory: frontend

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          flags: frontend
          directory: frontend/coverage

  # ─── Security scanning ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Run Trivy vulnerability scanner (repo)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Audit backend npm deps
        run: npm audit --audit-level=high
        working-directory: backend
        continue-on-error: true

      - name: Audit frontend npm deps
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  # ─── Build Docker images ──────────────────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      backend-digest: ${{ steps.build-backend.outputs.digest }}
      frontend-digest: ${{ steps.build-frontend.outputs.digest }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="sha-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend
      - name: Docker metadata — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}

      # Frontend
      - name: Docker metadata — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # Container vulnerability scan on final image
      - name: Trivy scan — backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/backend:sha-${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          exit-code: "0"

      - name: Upload backend image scan
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: backend-image

  # ─── Update Helm values for GitOps ───────────────────────────────────────────
  update-manifests:
    name: Update Image Tags in Helm
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set environment overlay
        id: env
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "overlay=production" >> $GITHUB_OUTPUT
          else
            echo "overlay=staging" >> $GITHUB_OUTPUT
          fi

      - name: Update image tags in Helm values
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          OVERLAY="${{ steps.env.outputs.overlay }}"
          VALUES_FILE="helm/ca-guardian/values-${OVERLAY}.yaml"

          sed -i "s|tag:.*# backend-tag|tag: ${VERSION} # backend-tag|" "${VALUES_FILE}"
          sed -i "s|tag:.*# frontend-tag|tag: ${VERSION} # frontend-tag|" "${VALUES_FILE}"

          echo "Updated ${VALUES_FILE} with version ${VERSION}"
          cat "${VALUES_FILE}"

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore(deploy): update ${{ steps.env.outputs.overlay }} to ${{ needs.build.outputs.version }} [skip ci]"
          git push
