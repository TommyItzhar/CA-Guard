name: Deploy Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploys a live demo to GitHub Pages (frontend) + a lightweight backend
# The demo uses DEMO_MODE=true — no database or Azure credentials needed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: demo-deploy
  cancel-in-progress: true

jobs:
  build-demo:
    name: Build Demo Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: frontend

      - name: Build demo frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: "true"
          # Point API calls to your demo backend URL
          VITE_API_URL: ${{ vars.DEMO_BACKEND_URL || 'http://localhost:3001' }}

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy-demo-pages:
    name: Deploy to GitHub Pages
    needs: build-demo
    runs-on: ubuntu-latest
    environment:
      name: demo
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Optional: deploy demo backend to a lightweight host (Railway, Render, Fly.io)
  deploy-demo-backend:
    name: Deploy Demo Backend
    runs-on: ubuntu-latest
    needs: build-demo
    if: vars.DEMO_BACKEND_URL != ''
    steps:
      - uses: actions/checkout@v4

      - name: Build demo backend image
        run: |
          docker build -t ca-guardian-demo-backend ./backend
          echo "Demo backend image built"

      # Uncomment and configure for your chosen host:

      # Railway:
      # - uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: ca-guardian-demo-backend

      # Render:
      # - run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      # Fly.io:
      # - uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --remote-only
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Summary
        run: |
          echo "## Demo Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Configure a backend host (Railway/Render/Fly.io) by uncommenting the relevant section." >> $GITHUB_STEP_SUMMARY
          echo "Set DEMO_BACKEND_URL in repository variables to enable backend deployment." >> $GITHUB_STEP_SUMMARY
