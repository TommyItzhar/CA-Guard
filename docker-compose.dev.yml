# Development overrides — mount source, enable hot reload
services:
  postgres:
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      target: builder
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    environment:
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src
    ports:
      - "3001:3001"

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
