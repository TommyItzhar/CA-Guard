# =============================================================================
# External Secrets Operator — Azure Key Vault integration
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# Store these keys in Azure Key Vault with the exact names below:
#   ca-guardian-azure-client-id
#   ca-guardian-azure-client-secret
#   ca-guardian-azure-tenant-id
#   ca-guardian-jwt-secret
#   ca-guardian-db-password
#   ca-guardian-session-secret
#   ca-guardian-smtp-pass
# =============================================================================
---
# SecretStore — authenticates to Azure Key Vault using Workload Identity
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-keyvault
  namespace: ca-guardian
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: "https://YOUR-KEYVAULT-NAME.vault.azure.net"
      serviceAccountRef:
        name: ca-guardian-external-secrets
---
# ServiceAccount with workload identity annotation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ca-guardian-external-secrets
  namespace: ca-guardian
  annotations:
    azure.workload.identity/client-id: "YOUR-MANAGED-IDENTITY-CLIENT-ID"
---
# ExternalSecret — pulls values from Key Vault into a K8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ca-guardian-secrets
  namespace: ca-guardian
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: azure-keyvault
    kind: SecretStore

  target:
    name: ca-guardian-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque

  data:
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: ca-guardian-azure-client-id

    - secretKey: AZURE_CLIENT_SECRET
      remoteRef:
        key: ca-guardian-azure-client-secret

    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: ca-guardian-azure-tenant-id

    - secretKey: JWT_SECRET
      remoteRef:
        key: ca-guardian-jwt-secret

    - secretKey: DB_PASSWORD
      remoteRef:
        key: ca-guardian-db-password

    - secretKey: SESSION_SECRET
      remoteRef:
        key: ca-guardian-session-secret

    - secretKey: SMTP_PASS
      remoteRef:
        key: ca-guardian-smtp-pass
---
# Staging version (separate Key Vault secrets)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ca-guardian-secrets
  namespace: ca-guardian-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: SecretStore
  target:
    name: ca-guardian-secrets
    creationPolicy: Owner
  data:
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: ca-guardian-staging-azure-client-id
    - secretKey: AZURE_CLIENT_SECRET
      remoteRef:
        key: ca-guardian-staging-azure-client-secret
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: ca-guardian-azure-tenant-id
    - secretKey: JWT_SECRET
      remoteRef:
        key: ca-guardian-staging-jwt-secret
    - secretKey: DB_PASSWORD
      remoteRef:
        key: ca-guardian-staging-db-password
    - secretKey: SESSION_SECRET
      remoteRef:
        key: ca-guardian-staging-session-secret
    - secretKey: SMTP_PASS
      remoteRef:
        key: ca-guardian-smtp-pass
