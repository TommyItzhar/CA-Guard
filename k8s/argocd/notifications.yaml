apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # ─── Triggers ───────────────────────────────────────────────────────────────
  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  trigger.on-deployed: |
    - when: app.status.operationState.phase in ['Succeeded'] && app.status.health.status == 'Healthy'
      send: [app-deployed]

  # ─── Templates ──────────────────────────────────────────────────────────────
  template.app-sync-succeeded: |
    slack:
      attachments: |
        [{
          "color": "#18be52",
          "blocks": [
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "✅ *Stone Guard sync succeeded*\n*App:* {{.app.metadata.name}}\n*Environment:* {{.app.metadata.labels.environment}}\n*Revision:* `{{.app.status.sync.revision | substr 0 7}}`"
              }
            },
            {
              "type": "actions",
              "elements": [
                {
                  "type": "button",
                  "text": {"type": "plain_text", "text": "View in ArgoCD"},
                  "url": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
                }
              ]
            }
          ]
        }]

  template.app-sync-failed: |
    slack:
      attachments: |
        [{
          "color": "#E53E3E",
          "blocks": [
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "❌ *Stone Guard sync FAILED*\n*App:* {{.app.metadata.name}}\n*Environment:* {{.app.metadata.labels.environment}}\n*Error:* {{.app.status.operationState.message}}"
              }
            },
            {
              "type": "actions",
              "elements": [
                {
                  "type": "button",
                  "text": {"type": "plain_text", "text": "View Error"},
                  "style": "danger",
                  "url": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
                }
              ]
            }
          ]
        }]

  template.app-health-degraded: |
    slack:
      attachments: |
        [{
          "color": "#F6AD55",
          "blocks": [
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "⚠️ *Stone Guard health degraded*\n*App:* {{.app.metadata.name}}\n*Environment:* {{.app.metadata.labels.environment}}\n*Status:* {{.app.status.health.status}}\n*Message:* {{.app.status.health.message}}"
              }
            }
          ]
        }]

  template.app-deployed: |
    slack:
      attachments: |
        [{
          "color": "#18be52",
          "blocks": [
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "🚀 *Stone Guard deployed and healthy*\n*App:* {{.app.metadata.name}}\n*Environment:* {{.app.metadata.labels.environment}}\n*Version:* `{{.app.status.sync.revision | substr 0 7}}`"
              }
            }
          ]
        }]

  # ─── Services ───────────────────────────────────────────────────────────────
  service.slack: |
    token: $slack-token
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
type: Opaque
stringData:
  slack-token: "xoxb-YOUR-SLACK-BOT-TOKEN"
